<!DOCTYPE html>
<html>
<head>
  <title>Login - NeuroVision AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h1>Doctor Login</h1>

    <input type="email" id="email" placeholder="Email" class="input">
    <input type="password" id="password" placeholder="Password" class="input">

    <button onclick="login()" class="primary-btn">Login</button>

    <p id="error" style="color:red;"></p>

  </div>

</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = "/";
  } else {
    document.getElementById("error").innerText = data.error;
  }
}
</script>

</body>
</html>
